<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一輪花 Typing V6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Inconsolata:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d12; --surface: #13131a; --card: #1a1a24; --border: rgba(255,255,255,0.07);
    --accent: #e8a4c0; --accent2: #7dd3b0; --text: #e8e4dc; --muted: rgba(232,228,220,0.38);
    --error: #e87070; --done: #7dd3b0;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Serif JP', serif; overflow: hidden; }
  .petals-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .petal { position: absolute; top: -40px; width: 8px; height: 12px; border-radius: 50% 50% 50% 0; background: var(--accent); opacity: 0; animation: fall linear infinite; }
  @keyframes fall {
    0% { opacity: 0; transform: translateX(0) rotate(0deg); top: -40px; }
    10% { opacity: 0.18; } 90% { opacity: 0.12; } 100% { opacity: 0; transform: translateX(80px) rotate(360deg); top: 110vh; }
  }
  #app { position: relative; z-index: 1; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .game-header { text-align: center; margin-bottom: 15px; }
  .song-title { font-size: clamp(22px, 4vw, 36px); font-weight: 700; letter-spacing: 0.18em; color: var(--accent); text-shadow: 0 0 40px rgba(232,164,192,0.35); }
  
  .audio-section { margin-bottom: 15px; display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 8px 18px; }
  .audio-section label { font-size: 11px; color: var(--muted); font-family: 'Inconsolata', monospace; }
  .audio-section input[type="text"] { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: 'Inconsolata', monospace; font-size: 12px; padding: 5px 10px; width: 180px; outline: none; }
  .load-btn { background: var(--accent); color: #1a0d12; border: none; border-radius: 6px; padding: 6px 14px; font-size: 11px; font-family: 'Inconsolata', monospace; cursor: pointer; font-weight: 600; }
  audio { height: 28px; filter: invert(1) hue-rotate(180deg) brightness(0.7); }

  .section-nav { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; align-items: center; }
  .jump-btn { background: rgba(255,255,255,0.05); color: var(--accent); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: 0.3s; }
  .jump-btn:hover { background: var(--accent); color: #1a0d12; }
  .step-btn { background: rgba(125,211,176,0.1); color: var(--accent2); border-color: rgba(125,211,176,0.2); font-weight: 600; }
  .step-btn:hover { background: var(--accent2); color: #0d1210; }

  .stats-bar { display: flex; gap: 24px; margin-bottom: 20px; font-family: 'Inconsolata', monospace; }
  .stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-val { font-size: 22px; font-weight: 600; color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; }
  .stat-sep { width: 1px; background: var(--border); align-self: stretch; margin: 4px 0; }

  .game-card { width: min(850px, 100%); background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 35px 40px; box-shadow: 0 32px 80px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
  .current-line { text-align: center; margin-bottom: 20px; position: relative; }
  .control-btns { display: flex; align-items: center; justify-content: center; gap: 10px; margin-right: 15px; }
  .play-line-btn { display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid rgba(232,164,192,0.3); cursor: pointer; transition: all 0.2s; font-size: 14px; background: rgba(232,164,192,0.15); color: var(--accent); }
  .play-line-btn:hover { background: var(--accent); color: #1a0d12; transform: scale(1.1); }

  .lyric-container { display: flex; align-items: center; justify-content: center; margin-bottom: 15px; }
  .lyric-ruby { display: inline-flex; flex-wrap: wrap; align-items: flex-end; justify-content: center; font-size: clamp(24px, 4.5vw, 40px); line-height: 1.2; }
  .ruby-unit { display: inline-flex; flex-direction: column; align-items: center; justify-content: flex-end; }
  .ruby-unit .rt { font-size: 11px; color: var(--accent); line-height: 1; margin-bottom: 3px; min-height: 14px; opacity: 0.85; }
  .ruby-unit .rb { font-size: inherit; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
  .translation-always { font-size: 15px; color: var(--accent2); margin-top: 10px; font-style: italic; opacity: 0.9; letter-spacing: 0.05em; min-height: 22px; }
  .romaji-display { text-align: center; font-family: 'Inconsolata', monospace; font-size: clamp(16px, 2.5vw, 22px); letter-spacing: 0.08em; color: var(--muted); min-height: 32px; word-break: break-all; margin-top: 10px; }
  .rom-done { color: var(--done); }
  .rom-cursor { color: var(--accent); border-bottom: 2px solid var(--accent); animation: blink 0.9s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .input-area { margin-top: 25px; position: relative; }
  .type-input { width: 100%; background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 14px 20px; font-family: 'Inconsolata', monospace; font-size: 18px; color: var(--text); outline: none; transition: 0.2s; }
  .type-input.error { border-color: var(--error) !important; animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
  .progress-bar { display: flex; justify-content: center; gap: 4px; margin-top: 20px; flex-wrap: wrap; max-width: 800px; }
  .prog-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: 0.4s; }
  .prog-dot.done { background: var(--done); }
  .prog-dot.active { background: var(--accent); transform: scale(1.4); }
  .complete-screen { display: none; flex-direction: column; align-items: center; text-align: center; }
  .complete-screen.show { display: flex; }
  .gameplay.hidden { display: none; }
</style>
</head>
<body>
<div class="petals-canvas" id="petals"></div>
<div id="app">
  <div class="game-header"><div class="song-title">一 輪 花</div></div>
  <div class="audio-section">
    <label>MEDIA SOURCE</label>
    <input type="text" id="audioFilename" value="tuki-ichirinka.mp3" />
    <button class="load-btn" onclick="loadAudio()">Load</button>
    <audio id="audioPlayer" controls></audio>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-val" id="statTime">0:00</div><div class="stat-label">Time</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val" id="statWPM">0</div><div class="stat-label">WPM</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val" id="statAcc">--%</div><div class="stat-label">Acc</div></div>
    <div class="stat-sep"></div>
    <div class="stat"><div class="stat-val" id="statLines">0</div><div class="stat-label">Lines</div></div>
  </div>
  <div class="section-nav">
    <button class="jump-btn step-btn" onclick="prevLine()">⏮ Prev</button>
    <button class="jump-btn" onclick="jumpTo(0)">Section 1</button>
    <button class="jump-btn" onclick="jumpTo(10)">Chorus A</button>
    <button class="jump-btn" onclick="jumpTo(21)">Section 2</button>
    <button class="jump-btn" onclick="jumpTo(31)">Chorus B</button>
    <button class="jump-btn" onclick="jumpTo(42)">Ending</button>
    <button class="jump-btn step-btn" onclick="nextLine()">Next ⏭</button>
  </div>
  <div class="game-card">
    <div class="gameplay" id="gameplay">
      <div class="current-line">
        <div class="lyric-container">
          <div class="control-btns"><button class="play-line-btn" onclick="playCurrentSegment()" title="Replay line">⏵</button></div>
          <div class="lyric-ruby" id="lyricRuby"></div>
        </div>
        <div class="translation-always" id="transAlways"></div>
      </div>
      <div class="romaji-display" id="romajiDisplay"></div>
      <div class="input-area"><input type="text" class="type-input" id="typeInput" autocomplete="off" placeholder="type romaji here..." /></div>
    </div>
    <div class="complete-screen" id="completeScreen"><h2 style="color:var(--accent)">COMPLETE</h2><button class="load-btn" onclick="location.reload()" style="margin-top:20px">Restart</button></div>
  </div>
  <div class="progress-bar" id="progressBar"></div>
</div>

<script>

  { start: 139.5, ruby: [{rb:'思',rt:'おも'},'ってたんだ'], romaji: 'omotteta n da', translation: '是這樣想過的' },

];

let currentLine = 0, typedPos = 0, totalCorrect = 0, totalTyped = 0, startTime = null, timerInterval = null;

function loadAudio() { 
  const f = document.getElementById('audioFilename').value; 
  if(f) document.getElementById('audioPlayer').src = f; 
}

function playCurrentSegment() { 
  const p = document.getElementById('audioPlayer'); 
  if(p.src){ 
    p.currentTime = LYRICS[currentLine].start; 
    p.play(); 
    document.getElementById('typeInput').focus(); 
  } 
}

function nextLine() { if (currentLine < LYRICS.length - 1) jumpTo(currentLine + 1); else showComplete(); }
function prevLine() { if (currentLine > 0) jumpTo(currentLine - 1); }

function jumpTo(index) {
  if (index >= 0 && index < LYRICS.length) {
    currentLine = index;
    const p = document.getElementById('audioPlayer');
    if(p.src) { p.currentTime = LYRICS[index].start; p.play(); }
    renderLine();
    document.getElementById('typeInput').focus();
  }
}

function buildRubyHTML(arr) { 
  return arr.map(i => typeof i === 'string' ? i.split('').map(c => `<span class="ruby-unit"><span class="rt"></span><span class="rb">${c}</span></span>`).join('') : `<span class="ruby-unit"><span class="rt">${i.rt}</span><span class="rb">${i.rb}</span></span>`).join(''); 
}

function updateRomajiDisplay() { 
  const rom = LYRICS[currentLine].romaji; 
  let h = ''; 
  for(let i=0; i<rom.length; i++){ 
    if(i < typedPos) h += `<span class="rom-done">${rom[i]===' '?'&nbsp;':rom[i]}</span>`; 
    else if(i === typedPos) h += `<span class="rom-cursor">${rom[i]===' '?'&nbsp;':rom[i]}</span>`; 
    else h += `<span>${rom[i]===' '?'&nbsp;':rom[i]}</span>`; 
  } 
  document.getElementById('romajiDisplay').innerHTML = h; 
}

function renderLine() { 
  const l = LYRICS[currentLine]; 
  document.getElementById('lyricRuby').innerHTML = buildRubyHTML(l.ruby); 
  document.getElementById('transAlways').textContent = l.translation; 
  typedPos = 0; updateRomajiDisplay(); updateProgressDots(); 
}

function updateProgressDots() { 
  document.getElementById('progressBar').innerHTML = LYRICS.map((_, i) => `<div class="prog-dot ${i===currentLine?'active':(i<currentLine?'done':'')}"></div>`).join(''); 
}

document.getElementById('typeInput').addEventListener('input', function() { 
  if(!startTime){ startTime=Date.now(); timerInterval=setInterval(updateStats,500); } 
  let v=this.value; if(!v)return; 
  let c=v[v.length-1].toLowerCase(); 
  this.value=''; totalTyped++; 
  if(c===LYRICS[currentLine].romaji[typedPos].toLowerCase()){ 
    typedPos++; totalCorrect++; 
    if(typedPos >= LYRICS[currentLine].romaji.length){ 
      currentLine++; 
      if(currentLine >= LYRICS.length) showComplete(); 
      else {
          renderLine();
          const p = document.getElementById('audioPlayer');
          if(p.src && !p.paused) p.currentTime = LYRICS[currentLine].start;
      }
    } else updateRomajiDisplay(); 
  } else { 
    this.classList.add('error'); 
    setTimeout(()=>this.classList.remove('error'),300); 
  } 
});

function updateStats() { 
  const e = (Date.now()-startTime)/1000; 
  document.getElementById('statTime').textContent = Math.floor(e/60)+":"+Math.floor(e%60).toString().padStart(2,'0'); 
  document.getElementById('statWPM').textContent = Math.round((totalCorrect/5)/(e/60))||0; 
  document.getElementById('statAcc').textContent = totalTyped > 0 ? Math.round((totalCorrect/totalTyped)*100)+"%" : "--%"; 
  document.getElementById('statLines').textContent = currentLine; 
}

function showComplete() { clearInterval(timerInterval); document.getElementById('gameplay').classList.add('hidden'); document.getElementById('completeScreen').classList.add('show'); }

window.onload = () => { loadAudio(); renderLine(); document.getElementById('typeInput').focus(); };

for(let i=0; i<20; i++){ 
  let p=document.createElement('div'); p.className='petal'; 
  p.style.left=Math.random()*100+'%'; p.style.animationDuration=(5+Math.random()*10)+'s'; 
  p.style.animationDelay=(-Math.random()*10)+'s'; document.getElementById('petals').appendChild(p); 
}
</script>
</body>
